name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - id: release
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        with:
          ref: release-please--branches--main

      - uses: pnpm/action-setup@9fd676a19091d4595eefd76e4bd31c97133911f1 # v4.2.0
        if: ${{ steps.release.outputs.prs_created == 'true' }}

      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install dependencies
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Format release PR
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        run: |
          set -euo pipefail
          pnpm exec biome format --write \
            .release-please-manifest.json \
            packages/*/package.json \
            packages/*/CHANGELOG.md

          if git diff --quiet; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .release-please-manifest.json packages/*/package.json packages/*/CHANGELOG.md
          git commit -m "chore(release): format release files"
          git push origin HEAD:release-please--branches--main

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        if: ${{ steps.release.outputs.releases_created == 'true' }}

      - uses: pnpm/action-setup@9fd676a19091d4595eefd76e4bd31c97133911f1 # v4.2.0
        if: ${{ steps.release.outputs.releases_created == 'true' }}

      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        with:
          node-version: 24
          cache: 'pnpm'
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build packages
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        run: pnpm build

      - name: Publish @tcpip/wire
        if: ${{ steps.release.outputs['packages/wire--release_created'] == 'true' }}
        working-directory: packages/wire
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          NPM_VIEW_STDERR=$(mktemp)
          EXISTING=$(npm view "@tcpip/wire@$VERSION" version 2>"$NPM_VIEW_STDERR") || STATUS=$?
          if [ -n "$EXISTING" ]; then
            echo "@tcpip/wire@$VERSION is already published, skipping."
            rm -f "$NPM_VIEW_STDERR"
            exit 0
          elif [ "${STATUS:-0}" -ne 0 ] && ! grep -qiE 'E404|not found' "$NPM_VIEW_STDERR"; then
            cat "$NPM_VIEW_STDERR"
            rm -f "$NPM_VIEW_STDERR"
            exit 1
          fi
          rm -f "$NPM_VIEW_STDERR"
          pnpm publish --access public --no-git-checks --ignore-scripts --provenance

      - name: Publish @tcpip/dns
        if: ${{ steps.release.outputs['packages/dns--release_created'] == 'true' }}
        working-directory: packages/dns
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          NPM_VIEW_STDERR=$(mktemp)
          EXISTING=$(npm view "@tcpip/dns@$VERSION" version 2>"$NPM_VIEW_STDERR") || STATUS=$?
          if [ -n "$EXISTING" ]; then
            echo "@tcpip/dns@$VERSION is already published, skipping."
            rm -f "$NPM_VIEW_STDERR"
            exit 0
          elif [ "${STATUS:-0}" -ne 0 ] && ! grep -qiE 'E404|not found' "$NPM_VIEW_STDERR"; then
            cat "$NPM_VIEW_STDERR"
            rm -f "$NPM_VIEW_STDERR"
            exit 1
          fi
          rm -f "$NPM_VIEW_STDERR"
          pnpm publish --access public --no-git-checks --ignore-scripts --provenance

      - name: Publish tcpip
        if: ${{ steps.release.outputs['packages/tcpip--release_created'] == 'true' }}
        working-directory: packages/tcpip
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          NPM_VIEW_STDERR=$(mktemp)
          EXISTING=$(npm view "tcpip@$VERSION" version 2>"$NPM_VIEW_STDERR") || STATUS=$?
          if [ -n "$EXISTING" ]; then
            echo "tcpip@$VERSION is already published, skipping."
            rm -f "$NPM_VIEW_STDERR"
            exit 0
          elif [ "${STATUS:-0}" -ne 0 ] && ! grep -qiE 'E404|not found' "$NPM_VIEW_STDERR"; then
            cat "$NPM_VIEW_STDERR"
            rm -f "$NPM_VIEW_STDERR"
            exit 1
          fi
          rm -f "$NPM_VIEW_STDERR"
          pnpm publish --access public --no-git-checks --ignore-scripts --provenance

      - name: Publish @tcpip/http
        if: ${{ steps.release.outputs['packages/http--release_created'] == 'true' }}
        working-directory: packages/http
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          NPM_VIEW_STDERR=$(mktemp)
          EXISTING=$(npm view "@tcpip/http@$VERSION" version 2>"$NPM_VIEW_STDERR") || STATUS=$?
          if [ -n "$EXISTING" ]; then
            echo "@tcpip/http@$VERSION is already published, skipping."
            rm -f "$NPM_VIEW_STDERR"
            exit 0
          elif [ "${STATUS:-0}" -ne 0 ] && ! grep -qiE 'E404|not found' "$NPM_VIEW_STDERR"; then
            cat "$NPM_VIEW_STDERR"
            rm -f "$NPM_VIEW_STDERR"
            exit 1
          fi
          rm -f "$NPM_VIEW_STDERR"
          pnpm publish --access public --no-git-checks --ignore-scripts --provenance

      - name: Publish @tcpip/dhcp
        if: ${{ steps.release.outputs['packages/dhcp--release_created'] == 'true' }}
        working-directory: packages/dhcp
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          NPM_VIEW_STDERR=$(mktemp)
          EXISTING=$(npm view "@tcpip/dhcp@$VERSION" version 2>"$NPM_VIEW_STDERR") || STATUS=$?
          if [ -n "$EXISTING" ]; then
            echo "@tcpip/dhcp@$VERSION is already published, skipping."
            rm -f "$NPM_VIEW_STDERR"
            exit 0
          elif [ "${STATUS:-0}" -ne 0 ] && ! grep -qiE 'E404|not found' "$NPM_VIEW_STDERR"; then
            cat "$NPM_VIEW_STDERR"
            rm -f "$NPM_VIEW_STDERR"
            exit 1
          fi
          rm -f "$NPM_VIEW_STDERR"
          pnpm publish --access public --no-git-checks --ignore-scripts --provenance

      - name: Publish @tcpip/v86
        if: ${{ steps.release.outputs['packages/v86--release_created'] == 'true' }}
        working-directory: packages/v86
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          NPM_VIEW_STDERR=$(mktemp)
          EXISTING=$(npm view "@tcpip/v86@$VERSION" version 2>"$NPM_VIEW_STDERR") || STATUS=$?
          if [ -n "$EXISTING" ]; then
            echo "@tcpip/v86@$VERSION is already published, skipping."
            rm -f "$NPM_VIEW_STDERR"
            exit 0
          elif [ "${STATUS:-0}" -ne 0 ] && ! grep -qiE 'E404|not found' "$NPM_VIEW_STDERR"; then
            cat "$NPM_VIEW_STDERR"
            rm -f "$NPM_VIEW_STDERR"
            exit 1
          fi
          rm -f "$NPM_VIEW_STDERR"
          pnpm publish --access public --no-git-checks --ignore-scripts --provenance
